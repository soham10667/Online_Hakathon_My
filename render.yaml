services:
  # Python Backend Service
  - type: web
    name: meeting-copilot-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: meeting-copilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: meeting-copilot-redis
          property: connectionString
      - key: QDRANT_URL
        value: http://meeting-copilot-qdrant:6333
      - key: JWT_SECRET
        generateValue: true
      # The following are required API keys. Render will prompt you for these values during setup:
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false

  # Qdrant Vector DB (Self-hosted docker container)
  - type: web
    name: meeting-copilot-qdrant
    runtime: image
    imagePath: docker.io/qdrant/qdrant:latest
    plan: free
    envVars:
      - key: PORT
        value: 6333

  # Frontend static web site
  - type: web
    name: meeting-copilot-frontend
    runtime: static
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: meeting-copilot-backend
          property: host

  # Redis cache/pub-sub
  - type: redis
    name: meeting-copilot-redis
    plan: free

databases:
  # Primary PostgreSQL Database
  - name: meeting-copilot-db
    plan: free
